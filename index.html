<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ContaBliza - Login</title>

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/componentes.css">
  <link rel="stylesheet" href="css/pages.css">
</head>

<body>
  <main class="login-shell">
    <section class="login-hero">
      <img class="login-brand-logo" src="assets/contabliza-logo-light.svg" alt="ContaBliza">
      <p class="login-hero-copy">Entrá a tu espacio financiero sin perderte en pantallas pesadas.</p>
    </section>

    <section class="login-card">
      <h2>Iniciar sesión</h2>
      <p class="login-sub">Accedé a tu cuenta</p>

      <form id="loginForm">
        <div class="form-group login-field">
          <label class="login-hidden-label" for="user">Usuario</label>
          <div class="field-title">Usuario o email</div>
          <div class="input-shell">
            <span class="input-ico" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="8" r="4"></circle>
                <path d="M4 20c1.8-4 5-6 8-6s6.2 2 8 6"></path>
              </svg>
            </span>
            <input type="text" id="user" placeholder="Email o usuario" required>
          </div>
        </div>

        <div class="form-group login-field">
          <label class="login-hidden-label" for="pass">Contraseña</label>
          <div class="field-title">Contraseña</div>
          <div class="input-shell">
            <span class="input-ico" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
              </svg>
            </span>
            <input type="password" id="pass" placeholder="Contraseña" required>
            <button type="button" class="pass-eye" id="togglePass" aria-label="Mostrar u ocultar contraseña">
              <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <select id="idType" required style="display:none;">
          <option value="CI" selected>CI</option>
          <option value="RUT">RUT</option>
        </select>

        <div class="form-group login-field">
          <label class="login-hidden-label" for="idNumber">Número de documento</label>
          <div class="field-head">
            <div class="field-title">Número de documento</div>
            <div class="id-switch-wrap" aria-label="Tipo de documento">
              <button type="button" class="id-switch-btn is-active" data-id-type="CI">CI</button>
              <button type="button" class="id-switch-btn" data-id-type="RUT">RUT</button>
            </div>
          </div>
          <div class="input-shell">
            <span class="input-ico" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="16" rx="2"></rect>
                <path d="M7 9h6"></path>
                <path d="M7 13h10"></path>
              </svg>
            </span>
            <input type="text" id="idNumber" placeholder="Número de documento" inputmode="numeric" required>
          </div>
        </div>

        <label class="remember-wrap" for="rememberDevice">
          <input type="checkbox" id="rememberDevice">
          <span>Recordarme en este dispositivo</span>
        </label>

        <button type="submit" class="btn-primary">Ingresar</button>
      </form>

      <div class="login-links">
        <a href="#" id="forgotLink">¿Olvidaste tu contraseña?</a>
        <a href="#" id="registerLink">Registrarse</a>
      </div>

      <p class="login-hint">Demo rápida: `admin` / `1234`</p>
      <p class="login-footer">ContaBliza - Gestión simple para tus finanzas</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function wireIdTypeSwitch(){
      const hiddenSelect = document.getElementById("idType");
      const buttons = Array.from(document.querySelectorAll("[data-id-type]"));
      if(!hiddenSelect || !buttons.length) return;

      function setType(value){
        hiddenSelect.value = value;
        buttons.forEach((btn) => {
          btn.classList.toggle("is-active", btn.getAttribute("data-id-type") === value);
        });
      }

      buttons.forEach((btn) => {
        btn.addEventListener("click", () => setType(btn.getAttribute("data-id-type")));
      });

      setType(hiddenSelect.value || "CI");
    })();

    (function wireTogglePass(){
      const input = document.getElementById("pass");
      const btn = document.getElementById("togglePass");
      if(!input || !btn) return;
      btn.addEventListener("click", () => {
        input.type = input.type === "password" ? "text" : "password";
      });
    })();
  </script>
</body>
</html>
